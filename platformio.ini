[platformio]
default_envs = az-delivery-devkit-v4

[env]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps =
  Time
  Timezone
  Adafruit GFX Library
  Adafruit MQTT Library
  NTPClient
  MD_REncoder
  BH1750
  Adafruit BME280 Library
  DFRobotDFPlayerMini

[env:az-delivery-devkit-v4]

[env:az-delivery-devkit-v4-OTA]
upload_protocol = espota
upload_port = 192.168.0.132

[env:az-delivery-devkit-v4-greeting-morning-test]
extends = env:az-delivery-devkit-v4
build_flags =
  -DDEBUG_ON=1
  -DWakeGreetingTestMode=1
  -DScreenTimeOut=5
  -DWakeGreetingMorningIdleSeconds=5
  -DWakeGreetingAfternoonIdleSeconds=5

[env:az-delivery-devkit-v4-greeting-afternoon-test]
extends = env:az-delivery-devkit-v4
build_flags =
  -DDEBUG_ON=1
  -DWakeGreetingTestMode=2
  -DScreenTimeOut=5
  -DWakeGreetingMorningIdleSeconds=5
  -DWakeGreetingAfternoonIdleSeconds=5
